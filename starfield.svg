<svg width="100%" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0b0f2b"/>
    </linearGradient>
    <radialGradient id="comet-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ab4f8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8ab4f8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- twinkling stars, random-ish positions -->
  <g fill="#ffffff">
    <circle cx="40" cy="30" r="1.4"><animate attributeName="opacity" values="1;0.1;1" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="80" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="20" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="140" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="60" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="170" r="1"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="40" r="1.5"><animate attributeName="opacity" values="1;0.15;1" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="110" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="30" r="1.2"><animate attributeName="opacity" values="1;0.25;1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="150" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="70" r="1.4"><animate attributeName="opacity" values="1;0.1;1" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="20" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="130" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="60" r="1"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="990" cy="170" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="40" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="1110" cy="110" r="1.5"><animate attributeName="opacity" values="1;0.15;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1160" cy="30" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="180" r="1.1"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="190" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="90" r="1"><animate attributeName="opacity" values="1;0.25;1" dur="2.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- orbiting satellite dot around a fixed point -->
  <g>
    <circle cx="600" cy="110" r="2" fill="none"/>
    <ellipse cx="600" cy="110" rx="180" ry="46" fill="none" stroke="#2a2f55" stroke-width="1" stroke-dasharray="2 4" opacity="0.6"/>
    <circle r="3.5" fill="#8ab4f8">
      <animateMotion dur="9s" repeatCount="indefinite" path="M 780,110 A 180,46 0 1,1 420,110 A 180,46 0 1,1 780,110"/>
    </circle>
  </g>

  <!-- comet streaking across -->
  <g>
    <circle r="30" fill="url(#comet-glow)">
      <animateMotion dur="6s" repeatCount="indefinite" path="M -50,40 L 1250,190"/>
    </circle>
    <circle r="2.5" fill="#ffffff">
      <animateMotion dur="6s" repeatCount="indefinite" path="M -50,40 L 1250,190"/>
    </circle>
  </g>

  <!-- center mission text -->
  <text x="600" y="118" text-anchor="middle" font-family="Fira Code, monospace" font-size="26" fill="#c9d1d9" letter-spacing="4">
    OM SAWANT
  </text>
  <text x="600" y="145" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#8ab4f8" letter-spacing="2">
    AGENTIC AI &#183; DEEP LEARNING &#183; NLP &#183; CNN
  </text>
</svg>
