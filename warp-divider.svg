<svg width="100%" height="30" viewBox="0 0 1200 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8ab4f8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="14" width="1200" height="2" fill="url(#line)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <circle cy="15" r="3" fill="#ffffff">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M 0,0 L 1200,0"/>
  </circle>
</svg>
